<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Quizz cinéma — 10 énigmes, 50 affiches, qui sera le meilleur cinéphile ?">
  <title>Ciné Quizz 🎬</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ══════════════════════════════════════════════
       ÉCRAN 1 : ACCUEIL
  ══════════════════════════════════════════════ -->
  <div id="screen-welcome" class="screen screen--active">
    <div class="welcome-content">
      <div class="welcome-logo">🎬</div>
      <h1 class="welcome-title">Ciné Quizz</h1>
      <p class="welcome-subtitle">10 énigmes, 50 affiches, qui sera le meilleur cinéphile ?</p>
      <div class="welcome-form">
        <input
          id="player-name"
          type="text"
          class="name-input"
          placeholder="Ton prénom (optionnel)"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="words"
          maxlength="20"
        >
        <button id="btn-start" class="btn btn--primary btn--large">Jouer →</button>
        <button id="btn-resume" class="btn btn--ghost btn--large" style="display:none">
          ↩ Reprendre ma partie
        </button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       ÉCRAN 2 : QUESTION
  ══════════════════════════════════════════════ -->
  <div id="screen-question" class="screen">
    <div class="question-wrapper">
      <header class="question-header">
        <div class="question-meta">
          <span id="q-number" class="q-number">1 / 10</span>
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
        </div>
        <p id="q-enigma" class="q-enigma"></p>
        <p class="q-hint">Fais défiler et tape sur ton choix ↓</p>
      </header>
      <main class="poster-grid-container">
        <div id="poster-grid" class="poster-grid"></div>
      </main>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       ÉCRAN 3 : SCORE
  ══════════════════════════════════════════════ -->
  <div id="screen-score" class="screen">
    <canvas id="confetti-canvas" aria-hidden="true"></canvas>
    <div class="score-content">
      <div id="score-emoji" class="score-emoji"></div>
      <div class="score-number-wrap">
        <span id="score-count" class="score-count">0</span>
        <span class="score-total">/10</span>
      </div>
      <p id="score-message" class="score-message"></p>
      <p id="score-name" class="score-name"></p>
      <div class="score-actions">
        <button id="btn-results" class="btn btn--primary btn--large">Voir mes réponses →</button>
        <button id="btn-replay" class="btn btn--ghost">Rejouer</button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       ÉCRAN 4 : RÉSULTATS
  ══════════════════════════════════════════════ -->
  <div id="screen-results" class="screen">
    <div class="results-wrapper">
      <header class="results-header">
        <h2 class="results-title">Tes Réponses</h2>
        <p id="results-summary" class="results-summary"></p>
      </header>
      <ol id="results-list" class="results-list"></ol>
      <div class="results-actions">
        <button id="btn-home" class="btn btn--ghost">← Accueil</button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       BOTTOM SHEET (global, hors écrans)
  ══════════════════════════════════════════════ -->
  <div id="overlay" class="overlay"></div>
  <div id="bottom-sheet" class="bottom-sheet" role="dialog" aria-modal="true" aria-label="Confirmer le film">
    <div class="bs-handle"></div>
    <div class="bs-content">
      <img id="bs-poster" class="bs-poster" src="" alt="">
      <p id="bs-title" class="bs-title"></p>
      <p class="bs-question-label">C'est ton choix ?</p>
      <div class="bs-actions">
        <button id="btn-cancel" class="btn btn--secondary">Annuler</button>
        <button id="btn-confirm" class="btn btn--primary">Confirmer ✓</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
